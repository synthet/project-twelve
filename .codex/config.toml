# Safe, portable defaults for trusted ProjectTwelve checkouts.
approval_policy = "on-request"
sandbox_mode = "workspace-write"
project_doc_max_bytes = 65536

[sandbox_workspace_write]
network_access = false

[agents]
max_threads = 4
max_depth = 1

[mcp_servers.project-twelve-ingame-mcp]
url = "http://127.0.0.1:8765/mcp"
enabled = true
required = false
startup_timeout_sec = 5
tool_timeout_sec = 30

[mcp_servers.project-twelve-fff-mcp]
command = "fff-mcp"
args = ["--no-warmup", "."]
enabled = true
required = false
startup_timeout_sec = 15
tool_timeout_sec = 30

[mcp_servers.pixellab]
command = "node"
args = ["scripts/start-pixellab-mcp.js"]
enabled = true
required = false
startup_timeout_sec = 20
tool_timeout_sec = 60
