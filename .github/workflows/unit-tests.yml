name: Unity Unit Tests

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  HAS_UNITY_LICENSE: ${{ secrets.UNITY_LICENSE != '' || secrets.UNITY_SERIAL != '' }}

jobs:
  editmode-tests:
    name: EditMode tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          lfs: true

      - name: Cache Unity Library
        if: env.HAS_UNITY_LICENSE == 'true'
        uses: actions/cache@v5
        with:
          path: Library
          key: Library-${{ runner.os }}-${{ hashFiles('Packages/manifest.json', 'Packages/packages-lock.json', 'ProjectSettings/ProjectVersion.txt') }}
          restore-keys: |
            Library-${{ runner.os }}-
            Library-

      - name: Explain skipped Unity tests
        if: env.HAS_UNITY_LICENSE != 'true'
        run: |
          echo "Unity EditMode tests were skipped because neither UNITY_LICENSE nor UNITY_SERIAL is configured."
          echo "Add one of those repository secrets to enable GameCI test execution."

      - name: Run EditMode unit tests
        if: env.HAS_UNITY_LICENSE == 'true'
        uses: game-ci/unity-test-runner@v4.3.1
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: .
          unityVersion: 6000.2.10f1
          testMode: EditMode
          artifactsPath: test-results
          githubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload test results
        if: always() && env.HAS_UNITY_LICENSE == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: unity-editmode-test-results
          path: test-results
          if-no-files-found: error
