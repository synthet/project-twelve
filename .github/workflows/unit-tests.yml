name: Unity Unit Tests

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  HAS_UNITY_LICENSE: ${{ secrets.UNITY_LICENSE != '' || secrets.UNITY_SERIAL != '' }}

jobs:
  editmode-tests:
    name: EditMode tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          lfs: true

      # This repo does not provision a Unity CI license. Missing secrets must not
      # fail the check — EditMode is a local gate (see quality-gates.md).
      - name: Skip when Unity license secret is missing
        if: env.HAS_UNITY_LICENSE != 'true'
        run: |
          echo "::notice::Unity EditMode tests skipped: neither UNITY_LICENSE nor UNITY_SERIAL is configured."
          echo "This repository does not run GameCI Unity tests in CI (no Unity license on Actions)."
          echo "Run EditMode locally before merge; agent-checks + offline npm tests remain the CI gates."
          echo "See docs/wiki/quality-gates.md § 'Unity EditMode tests in CI'."

      - name: Cache Unity Library
        if: env.HAS_UNITY_LICENSE == 'true'
        uses: actions/cache@v5
        with:
          path: Library
          key: Library-${{ runner.os }}-${{ hashFiles('Packages/manifest.json', 'Packages/packages-lock.json', 'ProjectSettings/ProjectVersion.txt') }}
          restore-keys: |
            Library-${{ runner.os }}-
            Library-

      # Delete the committed terrain golden fixture so the parity step below can
      # only pass against a fixture re-authored by TerrainFixtureExportTests in
      # THIS run (C# → JS terrain parity, P2-GEN-001).
      - name: Remove committed terrain fixture (force CI re-export)
        if: env.HAS_UNITY_LICENSE == 'true'
        run: rm -f tools/world-viz/test/fixtures/surface.seed1337.json

      - name: Run EditMode unit tests
        if: env.HAS_UNITY_LICENSE == 'true'
        uses: game-ci/unity-test-runner@v4.3.1
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: .
          unityVersion: 6000.5.1f1
          testMode: EditMode
          artifactsPath: test-results
          githubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload test results
        if: always() && env.HAS_UNITY_LICENSE == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: unity-editmode-test-results
          path: test-results
          if-no-files-found: error

      - name: world-viz parity vs CI-authored fixture
        if: env.HAS_UNITY_LICENSE == 'true'
        working-directory: tools/world-viz
        run: |
          test -f test/fixtures/surface.seed1337.json || {
            echo "::error::TerrainFixtureExportTests did not re-export tools/world-viz/test/fixtures/surface.seed1337.json"; exit 1; }
          node --test
