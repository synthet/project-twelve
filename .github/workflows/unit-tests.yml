name: Unity Unit Tests

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  HAS_UNITY_LICENSE: ${{ secrets.UNITY_LICENSE != '' || secrets.UNITY_SERIAL != '' }}
  # Fork PRs never receive repository secrets, so a real Unity run is impossible
  # there; everywhere else a missing license is a configuration error.
  IS_FORK_PR: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork }}

jobs:
  editmode-tests:
    name: EditMode tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          lfs: true

      - name: Fail when Unity license secret is missing
        if: env.HAS_UNITY_LICENSE != 'true' && env.IS_FORK_PR != 'true'
        run: |
          echo "::error::Unity EditMode tests cannot run: neither UNITY_LICENSE nor UNITY_SERIAL repository secret is configured."
          echo "This job intentionally fails instead of passing as a silent no-op (P2-QA-001)."
          echo "See docs/wiki/quality-gates.md § 'Unity EditMode tests in CI' for how to provision the license secret."
          exit 1

      - name: Skip note (fork PR without secrets)
        if: env.HAS_UNITY_LICENSE != 'true' && env.IS_FORK_PR == 'true'
        run: |
          echo "::warning::Fork PRs do not receive repository secrets; Unity EditMode tests were skipped. A maintainer must re-run them from a branch in this repository before merge."

      - name: Cache Unity Library
        if: env.HAS_UNITY_LICENSE == 'true'
        uses: actions/cache@v5
        with:
          path: Library
          key: Library-${{ runner.os }}-${{ hashFiles('Packages/manifest.json', 'Packages/packages-lock.json', 'ProjectSettings/ProjectVersion.txt') }}
          restore-keys: |
            Library-${{ runner.os }}-
            Library-

      # Delete the committed terrain golden fixture so the parity step below can
      # only pass against a fixture re-authored by TerrainFixtureExportTests in
      # THIS run (C# → JS terrain parity, P2-GEN-001 / P2-QA-001).
      - name: Remove committed terrain fixture (force CI re-export)
        if: env.HAS_UNITY_LICENSE == 'true'
        run: rm -f tools/world-viz/test/fixtures/surface.seed1337.json

      - name: Run EditMode unit tests
        if: env.HAS_UNITY_LICENSE == 'true'
        uses: game-ci/unity-test-runner@v4.3.1
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: .
          unityVersion: 6000.5.1f1
          testMode: EditMode
          artifactsPath: test-results
          githubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload test results
        if: always() && env.HAS_UNITY_LICENSE == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: unity-editmode-test-results
          path: test-results
          if-no-files-found: error

      - name: world-viz parity vs CI-authored fixture
        if: env.HAS_UNITY_LICENSE == 'true'
        working-directory: tools/world-viz
        run: |
          test -f test/fixtures/surface.seed1337.json || {
            echo "::error::TerrainFixtureExportTests did not re-export tools/world-viz/test/fixtures/surface.seed1337.json"; exit 1; }
          node --test
